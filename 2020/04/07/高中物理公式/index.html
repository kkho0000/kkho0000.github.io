        <h4 id="高中物理公式"><a href="#高中物理公式" class="headerlink" title="高中物理公式"></a>高中物理公式</h4><p><strong>基本单位</strong></p>
<script type="math/tex; mode=display">
s,m,kg,A,K,mol,Cd</script><hr>
<p><strong>定义式</strong></p>
<script type="math/tex; mode=display">
v = \frac{\Delta x}{\Delta t} \\
a = \frac{\Delta v}{\Delta t} \\
k = \frac{\Delta F}{\Delta x} \\
\mu = \frac{f}{N} \\
E = \frac{F}{q} \\
I = \frac{\Delta q}{\Delta t} \\
C = \frac{Q}{U} \\</script><p>决定式</p>
<script type="math/tex; mode=display">
a = \frac{\Sigma F}{m} \\</script><hr>
<script type="math/tex; mode=display">
\overline v = \frac{x}{t} \\
v_{ \frac{t}{2} } = \frac{ v_0 + v }{2} \\
v_{ \frac{x}{2} } = \sqrt \frac{ v^2 + v_0^2 }{2} \\
v = v_0 + at \\
x = v_0 t + \frac{1}{2}at^2 \\
v_t^2 - v_0^2 = 2 a x \\
\Delta x = aT^2</script><hr>
